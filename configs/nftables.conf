table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Loopback
        iif "lo" accept

        # Conexiones establecidas
        ct state established,related accept

        # SSH local y alternativo
        tcp dport { 22, 2222 } accept

        # ICMP
        icmp type echo-request accept
        icmpv6 type echo-request accept

        # DNS desde WAN (enp32s0)
        iifname "enp32s0" ip saddr 192.168.100.0/24 udp dport 53 accept
        iifname "enp32s0" ip saddr 192.168.100.0/24 tcp dport 53 accept

        # DNS desde LAN (enp63s0)
        iifname "enp63s0" ip saddr 100.50.25.0/24 udp dport 53 accept
        iifname "enp63s0" ip saddr 100.50.25.0/24 tcp dport 53 accept

        # HTTP/HTTPS (página de advertencia nginx)
        tcp dport { 80, 443 } accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;

        # Forwarding bidireccional entre WAN y LAN
        iif "enp32s0" oif "enp63s0" accept
        iif "enp63s0" oif "enp32s0" accept

        ct state established,related accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table ip nat {
    chain prerouting {
        type nat hook prerouting priority dstnat; policy accept;

        # [TEST] Port forwarding experimental — redirige 2222 WAN → SSH interno
        iif "enp32s0" tcp dport 2222 dnat to 100.50.25.15:22
    }

    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # Masquerade: salida por LAN hacia internet
        oif "enp63s0" masquerade
    }
}
